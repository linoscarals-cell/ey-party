
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>EY Choice Simulator</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 120px;
    background: #fafafa;
    overflow: hidden;
}

h1 {
    margin-bottom: 40px;
}

button {
    padding: 14px 28px;
    font-size: 18px;
    margin: 10px;
    cursor: pointer;
    border-radius: 10px;
    border: none;
}

#opt1 {
    background-color: #4CAF50;
    color: white;
    position: absolute;
}

#opt2 {
    background-color: #ff4d4d;
    color: white;
}
</style>
</head>

<body>

<h1>Tu préfères...</h1>

<p>
1️⃣ Te téléporter n'importe où dans le monde et être millionnaire instantanément 💸🌍  
<br><br>
2️⃣ Finir tous tes leads de la journée afin de rendre les shareholders happy 📊
</p>

<button id="opt1">Choix 1</button>
<button id="opt2">Choix 2</button>

<script>

const opt1 = document.getElementById("opt1");
const opt2 = document.getElementById("opt2");

// Bouton impossible à cliquer
opt1.addEventListener("mouseover", () => {
    const maxX = window.innerWidth - 120;
    const maxY = window.innerHeight - 60;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    opt1.style.left = x + "px";
    opt1.style.top = y + "px";
    opt1.style.transform = `rotate(${Math.random() * 360}deg)`;
});

// Seul choix possible
opt2.onclick = () => {

    document.body.innerHTML = `
    <h1>🎉 Félicitations 🎉</h1>
    <h2>Vous êtes un bon employé EY ✅</h2>
    <p>
    Vous avez le droit à une augmentation de <b>0 euro</b> 💰  
    <br><br>
    Ainsi qu'à <b>plus de leads à réaliser demain</b> 📈  
    </p>
    `;
};

</script>

</body>
</html>
